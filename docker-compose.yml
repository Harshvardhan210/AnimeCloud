services:
  backend:
    build:
      context: ./anime-site
      dockerfile: Dockerfile
    container_name: anime-cloud-backend
    ports:
      - "8080:8080"
    volumes:
      - ./anime-site/data:/app/data
    networks:
      - anime-network
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:8080
    container_name: anime-cloud-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - anime-network
    restart: always

networks:
  anime-network:
    driver: bridge
